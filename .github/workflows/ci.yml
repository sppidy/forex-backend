name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile-check all modules
        run: python -m compileall -q .
      - name: Import users module (validates SQLAlchemy engine config)
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          python -c "import users"
        # api_server / autopilot_runner are NOT imported here — they pull in
        # forex-agent's `config` module via the production AGENT_DIR pattern,
        # which isn't checked out in this isolated sub-repo CI.
